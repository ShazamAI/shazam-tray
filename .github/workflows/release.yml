name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: shazam-tray-macos-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: shazam-tray-macos-arm64
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: shazam-tray-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: shazam-tray-windows-x86_64

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install Linux dependencies
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libayatana-appindicator3-dev libxdo-dev

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Create macOS .app bundle (arm64)
        if: matrix.target == 'aarch64-apple-darwin'
        run: |
          mkdir -p "Shazam Tray.app/Contents/MacOS"
          mkdir -p "Shazam Tray.app/Contents/Resources"
          cp target/${{ matrix.target }}/release/shazam-tray "Shazam Tray.app/Contents/MacOS/"

          # Generate .icns from PNG
          mkdir -p AppIcon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size icon_circle.png --out "AppIcon.iconset/icon_${size}x${size}.png" > /dev/null 2>&1
            double=$((size * 2))
            sips -z $double $double icon_circle.png --out "AppIcon.iconset/icon_${size}x${size}@2x.png" > /dev/null 2>&1
          done
          iconutil -c icns AppIcon.iconset -o "Shazam Tray.app/Contents/Resources/AppIcon.icns"

          cat > "Shazam Tray.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>Shazam Tray</string>
              <key>CFBundleDisplayName</key><string>Shazam Tray</string>
              <key>CFBundleIdentifier</key><string>dev.shazam.tray</string>
              <key>CFBundleVersion</key><string>${GITHUB_REF_NAME}</string>
              <key>CFBundleShortVersionString</key><string>${GITHUB_REF_NAME}</string>
              <key>CFBundleExecutable</key><string>shazam-tray</string>
              <key>CFBundleIconFile</key><string>AppIcon</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>LSMinimumSystemVersion</key><string>12.0</string>
              <key>LSUIElement</key><true/>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          # Create DMG with Applications symlink (drag-to-install)
          mkdir -p dmg-content
          mv "Shazam Tray.app" dmg-content/
          ln -s /Applications dmg-content/Applications
          hdiutil create -volname "Shazam Tray" -srcfolder dmg-content -ov -format UDZO shazam-tray-macos-arm64.dmg

      - name: Create macOS .app bundle (x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        run: |
          mkdir -p "Shazam Tray.app/Contents/MacOS"
          mkdir -p "Shazam Tray.app/Contents/Resources"
          cp target/${{ matrix.target }}/release/shazam-tray "Shazam Tray.app/Contents/MacOS/"

          mkdir -p AppIcon.iconset
          for size in 16 32 64 128 256 512; do
            sips -z $size $size icon_circle.png --out "AppIcon.iconset/icon_${size}x${size}.png" > /dev/null 2>&1
            double=$((size * 2))
            sips -z $double $double icon_circle.png --out "AppIcon.iconset/icon_${size}x${size}@2x.png" > /dev/null 2>&1
          done
          iconutil -c icns AppIcon.iconset -o "Shazam Tray.app/Contents/Resources/AppIcon.icns"

          cat > "Shazam Tray.app/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleName</key><string>Shazam Tray</string>
              <key>CFBundleDisplayName</key><string>Shazam Tray</string>
              <key>CFBundleIdentifier</key><string>dev.shazam.tray</string>
              <key>CFBundleVersion</key><string>${GITHUB_REF_NAME}</string>
              <key>CFBundleShortVersionString</key><string>${GITHUB_REF_NAME}</string>
              <key>CFBundleExecutable</key><string>shazam-tray</string>
              <key>CFBundleIconFile</key><string>AppIcon</string>
              <key>CFBundlePackageType</key><string>APPL</string>
              <key>LSMinimumSystemVersion</key><string>12.0</string>
              <key>LSUIElement</key><true/>
              <key>NSHighResolutionCapable</key><true/>
          </dict>
          </plist>
          PLIST

          mkdir -p dmg-content
          mv "Shazam Tray.app" dmg-content/
          ln -s /Applications dmg-content/Applications
          hdiutil create -volname "Shazam Tray" -srcfolder dmg-content -ov -format UDZO shazam-tray-macos-x86_64.dmg

      - name: Package Linux binary
        if: matrix.os == 'ubuntu-latest'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/shazam-tray dist/
          cp icon_circle.png dist/shazam-tray.png
          cp LICENSE dist/
          tar czf shazam-tray-linux-x86_64.tar.gz -C dist .

      - name: Package Windows binary
        if: matrix.os == 'windows-latest'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/shazam-tray.exe dist/
          cp icon_circle.png dist/shazam-tray.png
          cp LICENSE dist/
          7z a shazam-tray-windows-x86_64.zip ./dist/*

      - name: Upload macOS DMG (arm64)
        if: matrix.target == 'aarch64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: shazam-tray-macos-arm64
          path: shazam-tray-macos-arm64.dmg

      - name: Upload macOS DMG (x86_64)
        if: matrix.target == 'x86_64-apple-darwin'
        uses: actions/upload-artifact@v4
        with:
          name: shazam-tray-macos-x86_64
          path: shazam-tray-macos-x86_64.dmg

      - name: Upload Linux archive
        if: matrix.os == 'ubuntu-latest'
        uses: actions/upload-artifact@v4
        with:
          name: shazam-tray-linux-x86_64
          path: shazam-tray-linux-x86_64.tar.gz

      - name: Upload Windows archive
        if: matrix.os == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: shazam-tray-windows-x86_64
          path: shazam-tray-windows-x86_64.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body: |
            ## Shazam Tray ${{ github.ref_name }}

            macOS menu bar app for the Shazam AI Agent Orchestrator.

            ### Downloads

            | Platform | File |
            |---|---|
            | macOS (Apple Silicon) | `shazam-tray-macos-arm64.dmg` |
            | macOS (Intel) | `shazam-tray-macos-x86_64.dmg` |
            | Linux (x86_64) | `shazam-tray-linux-x86_64.tar.gz` |
            | Windows (x86_64) | `shazam-tray-windows-x86_64.zip` |

            ### macOS Install
            1. Download the `.dmg` for your Mac
            2. Open the DMG and drag **Shazam Tray** to Applications
            3. Open from Spotlight: `Cmd+Space` → "Shazam Tray"

            ### Linux Install
            ```bash
            tar xzf shazam-tray-linux-x86_64.tar.gz
            sudo mv shazam-tray /usr/local/bin/
            ```

            ### Windows Install
            Extract `shazam-tray-windows-x86_64.zip` and run `shazam-tray.exe`.

            ### Requirements
            - [Shazam CLI](https://github.com/ShazamAI/shazam-cli) installed
            - Shazam daemon: `shazam daemon start`
          files: |
            artifacts/shazam-tray-macos-arm64/shazam-tray-macos-arm64.dmg
            artifacts/shazam-tray-macos-x86_64/shazam-tray-macos-x86_64.dmg
            artifacts/shazam-tray-linux-x86_64/shazam-tray-linux-x86_64.tar.gz
            artifacts/shazam-tray-windows-x86_64/shazam-tray-windows-x86_64.zip
          draft: false
          prerelease: false
